<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CABAL PRIDE - Campaign Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Exo+2:wght@500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#030312;
      --panel:rgba(8,8,28,.72);
      --panel-strong:rgba(12,12,38,.86);
      --gold:#f0d060;
      --gold-2:#ffd433;
      --red:#ff4758;
      --blue:#5ab4ff;
      --ink:#fff7d6;
      --muted:#c8c4ee;
      --line:rgba(240,208,96,.28);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      color:var(--ink);
      font-family:'Exo 2',system-ui,sans-serif;
      overflow-x:hidden;
      background:#030312;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image:url('KV-1920x1080-Plain.png');
      background-position:center top;
      background-size:cover;
      background-repeat:no-repeat;
      opacity:.78;
      filter:saturate(1.04) contrast(1.04);
      pointer-events:none;
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 20% 42%,rgba(134,0,40,.42),transparent 34%),
        radial-gradient(circle at 78% 38%,rgba(0,95,180,.42),transparent 36%),
        linear-gradient(180deg,rgba(3,3,18,.25),rgba(3,3,18,.78) 54%,rgba(3,3,18,.98));
      pointer-events:none;
    }
    a{color:inherit;text-decoration:none}
    .page{position:relative;z-index:1;min-height:100vh;display:flex;justify-content:center;padding:34px 18px 0}
    .hub{width:min(1060px,100%);display:flex;flex-direction:column;align-items:center;text-align:center}
    .brand-logo{width:min(390px,70vw);height:auto;display:block;margin:0 auto 26px;filter:drop-shadow(0 18px 30px rgba(0,0,0,.7)) drop-shadow(0 0 22px rgba(90,180,255,.34))}
    .timeline-card{width:min(860px,100%);padding:14px 16px 16px;border:1px solid rgba(240,208,96,.28);background:linear-gradient(180deg,rgba(14,14,42,.74),rgba(7,7,25,.86));box-shadow:0 22px 60px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.08);backdrop-filter:blur(6px)}
    .timeline-label{margin:0 0 12px;color:#fff7c7;font-size:.72rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;text-shadow:0 2px 8px rgba(0,0,0,.65)}
    .phase-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;align-items:stretch}
    .phase-card{position:relative;min-height:122px;display:flex;flex-direction:column;justify-content:center;padding:16px 12px 14px;color:#f5f0ff;background:linear-gradient(160deg,rgba(20,20,54,.76),rgba(8,8,28,.84));border:1px solid rgba(255,255,255,.12);box-shadow:inset 0 1px 0 rgba(255,255,255,.08);transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease,background .18s ease;overflow:hidden}
    .phase-card::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,71,88,.12),transparent 42%,rgba(90,180,255,.12));opacity:.7;pointer-events:none}
    .phase-card.active{border:2px solid var(--gold-2);background:linear-gradient(160deg,rgba(80,42,18,.74),rgba(15,15,40,.9));box-shadow:0 0 0 4px rgba(255,212,51,.08),0 0 28px rgba(240,208,96,.24),inset 0 1px 0 rgba(255,255,255,.1)}
    .phase-card:hover,.phase-card:focus-visible{transform:translateY(-2px);border-color:var(--gold-2);outline:none;box-shadow:0 18px 34px rgba(0,0,0,.32),0 0 24px rgba(240,208,96,.18)}
    .phase-title,.phase-desc,.phase-link{position:relative;z-index:1}
    .phase-title{margin:0 0 12px;font-size:1rem;line-height:1.18;font-weight:900;text-transform:uppercase;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.64)}
    .phase-desc{margin:0 0 5px;font-size:.82rem;font-weight:800;line-height:1.25;color:#f0ecff}
    .phase-link{font-size:.72rem;color:var(--gold);font-weight:900}
    .current-label{margin:20px 0 16px;min-width:310px;padding:11px 20px;background:linear-gradient(180deg,rgba(20,20,54,.86),rgba(8,8,28,.92));border:1px solid rgba(240,208,96,.22);color:#fff7c7;font-size:.84rem;font-weight:900;text-transform:uppercase;box-shadow:0 16px 38px rgba(0,0,0,.32)}
    .leaderboard{width:min(940px,100%);display:grid;grid-template-columns:repeat(5,1fr);gap:16px;align-items:end;margin-bottom:18px}
    .leader-card{min-width:0;display:flex;flex-direction:column;align-items:stretch;gap:8px;filter:drop-shadow(0 16px 24px rgba(0,0,0,.28))}
    .guild-logo{width:96px;height:96px;margin:0 auto 4px;border-radius:50%;display:grid;place-items:center;overflow:hidden;background:radial-gradient(circle at 50% 28%,#f8fbff 0 24%,#b6eaff 25% 42%,#f2f7ff 43% 58%,#82c74d 59% 100%);border:3px solid rgba(255,255,255,.92);box-shadow:0 0 0 5px rgba(240,208,96,.12),0 0 24px rgba(90,180,255,.22);color:#0c2149;font-family:'Cinzel',serif;font-size:1.45rem;font-weight:900}
    .guild-logo img{width:100%;height:100%;object-fit:cover}
    .guild-title,.guild-score{display:flex;align-items:center;justify-content:center;padding:9px 8px;background:linear-gradient(180deg,rgba(26,25,54,.9),rgba(12,12,35,.94));border:1px solid rgba(255,255,255,.1);color:#fff;font-weight:900;line-height:1.12;overflow-wrap:anywhere;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
    .guild-title{min-height:56px;font-size:.88rem;font-family:'Cinzel',serif;text-transform:uppercase;color:#fff7c7}
    .guild-score{min-height:44px;color:var(--gold);font-size:.9rem;text-shadow:0 0 12px rgba(240,208,96,.24)}
    .learn-more{display:inline-flex;align-items:center;justify-content:center;min-width:300px;min-height:52px;padding:14px 26px;background:linear-gradient(180deg,#d80f17,#a8060e);border:1px solid rgba(255,255,255,.14);border-radius:8px;color:#fff;font-family:'Cinzel',serif;font-weight:900;letter-spacing:.05em;box-shadow:0 16px 34px rgba(216,15,23,.28),0 0 24px rgba(216,15,23,.22);transition:transform .18s ease,filter .18s ease}
    .learn-more:hover,.learn-more:focus-visible{transform:translateY(-2px);filter:brightness(1.08);outline:2px solid var(--gold-2);outline-offset:3px}
    .community{width:100vw;margin-top:0;padding:18px 18px 28px;background:linear-gradient(180deg,rgba(10,6,22,.98),rgba(3,3,18,.98));border-top:1px solid rgba(240,208,96,.2);text-align:center;box-shadow:0 -18px 44px rgba(0,0,0,.28)}
    .community-kicker{margin:0 0 10px;color:var(--gold-2);font-size:.76rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.community-action{width:max-content;max-width:100%;margin:0 auto;display:grid;place-items:center;gap:8px;color:inherit;text-decoration:none}.community-action[aria-disabled="true"]{cursor:not-allowed;opacity:.62}.community-icon{width:64px;height:64px;display:grid;place-items:center;border-radius:50%;border:2px solid rgba(240,208,96,.75);background:rgba(240,208,96,.11);color:#f0d060;box-shadow:0 0 0 7px rgba(240,208,96,.06),0 0 24px rgba(240,208,96,.18);transition:transform .18s ease,background .18s ease}.community-action:not([aria-disabled="true"]):hover .community-icon,.community-action:not([aria-disabled="true"]):focus-visible .community-icon{transform:translateY(-2px) scale(1.04);background:rgba(240,208,96,.2);outline:none}.community-icon svg{width:32px;height:32px;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}.community-label{display:block;margin:0;color:#fff7c7;font-weight:900;font-size:.82rem}.source-note{margin:12px 0 0;color:rgba(255,255,255,.42);font-size:.62rem}
    @media(max-width:760px){.page{padding:26px 12px 0}.brand-logo{width:min(300px,78vw);margin-bottom:22px}.timeline-card{padding:10px}.phase-grid{grid-template-columns:1fr;gap:9px}.phase-card{min-height:92px}.leaderboard{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;width:min(430px,100%)}.leader-card:first-child{grid-column:1 / -1;width:min(210px,100%);justify-self:center}.guild-logo{width:82px;height:82px}.current-label,.learn-more{min-width:min(300px,100%)}}@media(max-width:420px){.leaderboard{grid-template-columns:1fr;width:min(240px,100%)}}
  

    /* === Restored previous fixed header === */
    :root{--nav-h:64px;}
    #site-nav{
      position:fixed;
      top:0;
      left:0;
      right:0;
      min-height:var(--nav-h);
      z-index:300;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      padding:8px 22px;
      background:rgba(3,3,18,.94);
      border-bottom:1px solid rgba(240,208,96,.18);
      box-shadow:0 2px 24px rgba(0,0,0,.48),inset 0 1px 0 rgba(255,255,255,.06);
      backdrop-filter:blur(10px);
    }
    .nav-brand{
      display:inline-flex;
      align-items:center;
      gap:12px;
      flex:0 0 auto;
      color:#f0d060;
      font-family:'Cinzel',serif;
      font-size:1.02rem;
      font-weight:900;
      letter-spacing:.06em;
      text-transform:uppercase;
      white-space:nowrap;
    }
    .nav-brand-logo{
      width:104px;
      height:42px;
      display:grid;
      place-items:center;
      overflow:hidden;
      flex:0 0 auto;
    }
    .nav-brand-logo img{
      width:100%;
      height:100%;
      object-fit:contain;
      filter:drop-shadow(0 0 8px rgba(90,180,255,.32));
    }
    .phase-header-links{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:8px;
      min-width:0;
    }
    .phase-header-links a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:34px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.045);
      color:#c8c4ee;
      font-size:.68rem;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      white-space:nowrap;
      transition:color .18s ease,background .18s ease,border-color .18s ease,transform .18s ease;
    }
    .phase-header-links a:hover,
    .phase-header-links a:focus-visible{
      color:#fff7c7;
      background:rgba(212,168,50,.1);
      border-color:rgba(240,208,96,.4);
      transform:translateY(-1px);
      outline:none;
    }
    .phase-header-links a[aria-current="true"]{
      color:#f0d060;
      border-color:rgba(240,208,96,.56);
      background:rgba(212,168,50,.14);
    }
    .page{padding-top:calc(var(--nav-h) + 32px) !important;}
    @media(max-width:760px){
      :root{--nav-h:92px;}
      #site-nav{align-items:flex-start;flex-direction:column;gap:7px;padding:8px 12px;}
      .nav-brand{font-size:.86rem;gap:8px;}
      .nav-brand-logo{width:68px;height:30px;}
      .phase-header-links{width:100%;justify-content:flex-start;overflow-x:auto;gap:6px;padding-bottom:2px;scrollbar-width:none;}
      .phase-header-links::-webkit-scrollbar{display:none;}
      .phase-header-links a{font-size:.56rem;padding:7px 9px;min-height:30px;}
      .page{padding-top:calc(var(--nav-h) + 22px) !important;}
    }

  

    /* === KV top crop enforcement === */
    body::before{
      background-position:center top !important;
      background-size:cover !important;
      background-repeat:no-repeat !important;
    }
    @media(max-aspect-ratio:16/9){
      body::before{background-size:auto 100vh !important;background-position:center top !important;}
    }
    @media(min-aspect-ratio:16/9){
      body::before{background-size:100vw auto !important;background-position:center top !important;}
    }

  

/* === Mobile quality pass for GitHub/Vercel === */
@media (max-width: 640px){
  :root{--nav-h:78px;}
  body::before{background-size:auto 100vh !important;background-position:center top !important;opacity:.68;}
  body::after{background:linear-gradient(180deg,rgba(3,3,18,.36),rgba(3,3,18,.88) 46%,#030312 100%),radial-gradient(circle at 18% 22%,rgba(145,0,48,.34),transparent 42%),radial-gradient(circle at 82% 18%,rgba(0,92,188,.34),transparent 42%);}
  #site-nav{min-height:var(--nav-h);padding:8px 10px 9px;gap:6px;}
  .nav-brand-logo{width:76px;height:32px}.nav-brand{font-size:.8rem;width:100%;justify-content:center;}
  .phase-header-links{width:100%;justify-content:center;gap:6px;overflow-x:auto;padding:0 2px 2px;}
  .phase-header-links a{min-height:30px;padding:7px 9px;font-size:.56rem;letter-spacing:.055em;}
  .page{padding:calc(var(--nav-h) + 14px) 12px 0 !important;min-height:auto;}
  .hub{width:100%;}
  .brand-logo{width:min(260px,74vw);margin:0 auto 14px;}
  .timeline-card{width:100%;padding:12px 10px 13px;border-radius:10px;background:rgba(7,7,25,.86);backdrop-filter:none;}
  .timeline-label{font-size:.66rem;margin-bottom:10px;}
  .phase-grid{grid-template-columns:1fr;gap:8px;}
  .phase-card{min-height:74px;padding:12px 12px;text-align:left;border-radius:8px;align-items:flex-start;}
  .phase-title{font-size:.86rem;line-height:1.18;margin:0 0 5px;}
  .phase-desc{font-size:.74rem;margin:0 0 3px;}
  .phase-link{font-size:.7rem;}
  .current-label{width:100%;min-width:0;margin:14px 0 12px;padding:10px 12px;border-radius:8px;font-size:.74rem;}
  .leaderboard{width:100%;display:flex;gap:10px;overflow-x:auto;align-items:stretch;margin:0 -12px 16px;padding:0 12px 8px;scroll-snap-type:x mandatory;}
  .leader-card,.leader-card:first-child{flex:0 0 136px;width:136px;scroll-snap-align:center;gap:6px;}
  .guild-logo{width:72px;height:72px;font-size:1.08rem;margin-bottom:2px;}
  .guild-title{min-height:46px;padding:8px 6px;font-size:.7rem;}
  .guild-score{min-height:36px;padding:7px 6px;font-size:.78rem;}
  .learn-more{width:min(300px,100%);min-width:0;min-height:48px;padding:12px 18px;font-size:.86rem;}
  .community{margin-top:16px;padding:18px 12px 24px;}
  .community-icon{width:58px;height:58px;}
}

  
    .company-flag{position:fixed;top:calc(var(--nav-h,64px) + 12px);left:16px;z-index:120;display:block;width:72px;max-width:18vw;border-radius:10px;overflow:hidden;background:#030312;border:1px solid rgba(240,208,96,.34);box-shadow:0 14px 34px rgba(0,0,0,.42),0 0 24px rgba(216,15,23,.18);transition:transform .18s ease,border-color .18s ease,filter .18s ease}.company-flag:hover,.company-flag:focus-visible{transform:translateY(-2px);border-color:#f0d060;filter:brightness(1.08);outline:none}.company-flag img{display:block;width:100%;height:auto}@media(max-width:840px){.company-flag{top:calc(var(--nav-h,84px) + 8px);left:10px;width:52px;border-radius:8px}}

    /* === REDESIGN: index layout to match mockup === */
    .tagline{margin:-8px 0 22px;font-family:'Cinzel',serif;font-size:clamp(.9rem,2vw,1.32rem);font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:#fff7d6;text-shadow:0 2px 14px rgba(0,0,0,.8),0 0 22px rgba(240,208,96,.22)}
    .tagline::before,.tagline::after{content:"\2726";color:var(--gold);margin:0 .55em;font-size:.7em;opacity:.85}
    .timeline-card{background:linear-gradient(180deg,rgba(10,10,32,.72),rgba(5,5,20,.82));border-color:rgba(240,208,96,.34);border-radius:6px;padding:16px 18px 18px}
    .timeline-label,.road-label{font-family:'Cinzel',serif;font-size:.82rem;letter-spacing:.24em;color:#fff4bf}
    .phase-grid{gap:14px}
    .phase-card{min-height:0;justify-content:flex-start;text-align:left;padding:16px 16px 15px;border-radius:6px;background:linear-gradient(160deg,rgba(18,18,46,.82),rgba(7,7,26,.9))}
    .phase-card.active{background:linear-gradient(160deg,rgba(60,44,16,.66),rgba(14,14,38,.92))}
    .phase-tag{position:relative;z-index:1;display:inline-grid;place-items:center;width:34px;height:34px;margin-bottom:12px;border-radius:8px;transform:rotate(45deg);border:1px solid rgba(240,208,96,.5);background:rgba(240,208,96,.1);color:var(--gold);font-family:'Cinzel',serif;font-weight:900;font-size:.82rem}
    .phase-tag>*{transform:rotate(-45deg)}
    .phase-head{position:relative;z-index:1;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
    .phase-title{margin:0;font-family:'Cinzel',serif;font-size:1.12rem;letter-spacing:.03em;color:#fff}
    .phase-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:4px;font-size:.6rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase}
    .phase-badge.is-active{background:linear-gradient(180deg,#f4d56a,#c9971f);color:#1a1204;box-shadow:0 0 14px rgba(240,208,96,.4)}
    .phase-badge.is-upcoming{background:rgba(90,120,190,.28);color:#bcd6ff;border:1px solid rgba(120,160,230,.4)}
    .phase-date{position:relative;z-index:1;margin:0 0 8px;color:#d7d2ff;font-size:.8rem;font-weight:800;letter-spacing:.02em}
    .phase-desc{margin:0 0 14px;color:#b9b4e4;font-size:.82rem;font-weight:700;line-height:1.4}
    .phase-link{display:inline-flex;align-items:center;justify-content:center;padding:8px 16px;border:1px solid rgba(240,208,96,.42);border-radius:4px;background:rgba(240,208,96,.06);color:#fff4bf;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase}
    /* Road to Victory */
    .road{width:min(940px,100%);margin:16px auto 0;text-align:center}
    .road-label{display:block;margin-bottom:6px}
    .road-today{margin:0 0 14px;color:#9fd0ff;font-size:.74rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;text-shadow:0 0 12px rgba(90,180,255,.3)}
    .road-track{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;width:100%}
    .road-node{display:flex;flex-direction:column;align-items:center;gap:8px;flex:0 0 auto;width:120px}
    .road-dot{display:grid;place-items:center;width:34px;height:34px;transform:rotate(45deg);border-radius:8px;border:1px solid rgba(240,208,96,.5);background:rgba(8,8,26,.9);color:var(--gold);font-family:'Cinzel',serif;font-weight:900;font-size:.76rem}
    .road-node.is-active .road-dot{background:linear-gradient(180deg,#f4d56a,#c9971f);color:#1a1204;box-shadow:0 0 16px rgba(240,208,96,.5)}
    .road-info{display:flex;flex-direction:column;gap:1px;line-height:1.2}
    .road-info strong{font-family:'Cinzel',serif;font-size:.78rem;color:#fff;text-transform:uppercase;letter-spacing:.04em}
    .road-info small{color:#c8c4ee;font-size:.68rem;font-weight:700}
    .road-status{font-size:.62rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:#5ab4ff}
    .road-node.is-active .road-status{color:var(--gold)}
    .road-line{flex:1;height:3px;margin-top:16px;border-radius:2px;background:rgba(255,255,255,.12)}
    .road-line.done{background:linear-gradient(90deg,#f4d56a,rgba(240,208,96,.2));box-shadow:0 0 12px rgba(240,208,96,.4)}
    /* Spotlight + Hall row */
    .spotlight-row{width:min(1060px,100%);display:grid;grid-template-columns:minmax(260px,.62fr) minmax(0,1fr);gap:16px;align-items:stretch;margin:24px auto 22px;text-align:left}
    .spotlight{padding:22px 22px 24px;border-radius:6px;border:1px solid rgba(240,208,96,.34);background:linear-gradient(160deg,rgba(48,34,12,.62),rgba(9,9,28,.9));box-shadow:0 20px 54px rgba(0,0,0,.4);display:flex;flex-direction:column;justify-content:center}
    .spot-kicker{margin:0 0 6px;font-size:.66rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:#fff4bf}
    .spot-title{margin:0 0 8px;font-family:'Cinzel',serif;font-size:clamp(1.8rem,4vw,2.7rem);line-height:1;color:#fff;text-shadow:0 0 24px rgba(240,208,96,.28)}
    .spot-meta{margin:0 0 12px;color:#e7e2ff;font-size:.82rem;font-weight:800;letter-spacing:.02em}
    .spot-meta span{color:var(--gold)}
    .spot-desc{margin:0 0 18px;color:#c4bfef;font-size:.9rem;font-weight:700;line-height:1.5}
    .spot-cta{align-self:flex-start;padding:10px 22px;border:1px solid rgba(240,208,96,.5);border-radius:4px;background:rgba(240,208,96,.08);color:#fff4bf;font-family:'Cinzel',serif;font-weight:900;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase}
    .hall{position:relative;padding:24px 22px 24px;border-radius:10px;border:1px solid rgba(240,208,96,.42);background:linear-gradient(180deg,rgba(14,13,38,.82),rgba(6,5,22,.9));box-shadow:0 24px 60px rgba(0,0,0,.5),0 0 34px rgba(240,208,96,.12),inset 0 0 44px rgba(240,208,96,.06),inset 0 1px 0 rgba(255,255,255,.08)}

<script id="v9-index-design-script">
(function(){
  function setRoadFill(){
    var phases=((typeof CONFIG!=='undefined'&&CONFIG&&CONFIG.phases)||[]);
    var track=document.getElementById('road-track');
    if(!track||!phases.length||typeof getPhaseProgress!=='function'||typeof isActive!=='function')return;
    var progress=getPhaseProgress(phases);
    var max=Math.max(1,phases.length-1);
    var fill=((progress.activeIndex||0)+(Math.max(0,Math.min(100,progress.percent||0))/100))/max;
    track.style.setProperty('--road-fill',(Math.max(0,Math.min(.84,fill*.84))*100)+'%');
    track.querySelectorAll('.road-node').forEach(function(node,i){
      node.classList.toggle('is-current',i===(progress.activeIndex||0));
      node.classList.toggle('is-past',i<(progress.activeIndex||0));
    });
  }
  var oldRender=window.renderHub;
  if(typeof oldRender==='function'){
    window.renderHub=function(){oldRender();setRoadFill();};
  }
  var oldUpdate=window.updateToday;
  if(typeof oldUpdate==='function'){
    window.updateToday=function(){oldUpdate();setRoadFill();};
  }
  setRoadFill();
  setTimeout(setRoadFill,300);
})();

<script id="v10-index-design-script">
(function(){
  function updateRoadConnector(){
    var track=document.getElementById('road-track');
    if(!track)return;
    var dots=track.querySelectorAll('.road-dot');
    if(dots.length<2)return;

    /* Mobile uses stacked timeline, so hide horizontal connector. */
    if(window.matchMedia && window.matchMedia('(max-width: 900px)').matches){
      track.style.setProperty('--road-line-left','0px');
      track.style.setProperty('--road-line-width','0px');
      track.style.setProperty('--road-fill-width','0px');
      return;
    }

    var trackRect=track.getBoundingClientRect();
    var first=dots[0].getBoundingClientRect();
    var last=dots[dots.length-1].getBoundingClientRect();
    var start=(first.right-trackRect.left);
    var end=(last.left-trackRect.left);
    var full=Math.max(0,end-start);

    var phases=((typeof CONFIG!=='undefined'&&CONFIG&&CONFIG.phases)||[]);
    var fraction=0;
    if(phases.length>1 && typeof getPhaseProgress==='function'){
      var progress=getPhaseProgress(phases);
      var max=Math.max(1,phases.length-1);
      fraction=((progress.activeIndex||0)+(Math.max(0,Math.min(100,progress.percent||0))/100))/max;
    }
    fraction=Math.max(0,Math.min(1,fraction));

    track.style.setProperty('--road-line-left',start+'px');
    track.style.setProperty('--road-line-width',full+'px');
    track.style.setProperty('--road-fill-width',(full*fraction)+'px');
  }

  var oldRenderHub=window.renderHub;
  if(typeof oldRenderHub==='function'){
    window.renderHub=function(){oldRenderHub();requestAnimationFrame(updateRoadConnector);setTimeout(updateRoadConnector,120);};
  }
  var oldUpdateToday=window.updateToday;
  if(typeof oldUpdateToday==='function'){
    window.updateToday=function(){oldUpdateToday();requestAnimationFrame(updateRoadConnector);};
  }
  window.addEventListener('resize',function(){requestAnimationFrame(updateRoadConnector);});
  window.addEventListener('load',function(){updateRoadConnector();setTimeout(updateRoadConnector,250);});
  updateRoadConnector();
  setTimeout(updateRoadConnector,350);
})();
</script>

<script id="v11-index-design-script">
(function(){
  function updateRoadProgress(){
    var track=document.getElementById('road-track');
    if(!track)return;
    var dots=track.querySelectorAll('.road-dot');
    if(dots.length<2)return;

    if(window.matchMedia && window.matchMedia('(max-width: 900px)').matches){
      track.style.setProperty('--road-line-left','0px');
      track.style.setProperty('--road-line-width','0px');
      track.style.setProperty('--road-fill-width','0px');
      return;
    }

    var trackRect=track.getBoundingClientRect();
    var first=dots[0].getBoundingClientRect();
    var last=dots[dots.length-1].getBoundingClientRect();
    var start=first.right-trackRect.left;
    var end=last.left-trackRect.left;
    var full=Math.max(0,end-start);

    var phases=((typeof CONFIG!=='undefined'&&CONFIG&&CONFIG.phases)||[]);
    var fraction=0;
    if(phases.length>1 && typeof getPhaseProgress==='function'){
      var p=getPhaseProgress(phases);
      var percent=Math.max(0,Math.min(100,Number(p.percent)||0));
      var activeIndex=Math.max(0,Number(p.activeIndex)||0);
      var maxIndex=Math.max(1,phases.length-1);
      fraction=(activeIndex+(percent/100))/maxIndex;
    }
    fraction=Math.max(0,Math.min(1,fraction));

    track.style.setProperty('--road-line-left',start+'px');
    track.style.setProperty('--road-line-width',full+'px');
    track.style.setProperty('--road-fill-width',(full*fraction)+'px');
  }

  function ensureHallCta(){
    var row=document.querySelector('.spotlight-row');
    if(!row || row.querySelector('.hall-learn-wrap'))return;
    var href=(window.CONFIG&&CONFIG.currentPhaseUrl)||'phase-1.html';
    var wrap=document.createElement('div');
    wrap.className='hall-learn-wrap';
    wrap.innerHTML='<a class="hall-learn-more" href="'+href+'">Learn More</a>';
    row.appendChild(wrap);
  }

  function run(){ensureHallCta();requestAnimationFrame(updateRoadProgress);setTimeout(updateRoadProgress,120);}

  var oldRenderHub=window.renderHub;
  if(typeof oldRenderHub==='function'){
    window.renderHub=function(){oldRenderHub();run();};
  }
  var oldUpdateToday=window.updateToday;
  if(typeof oldUpdateToday==='function'){
    window.updateToday=function(){oldUpdateToday();updateRoadProgress();};
  }
  window.addEventListener('resize',function(){requestAnimationFrame(updateRoadProgress);});
  window.addEventListener('load',run);
  run();
  setTimeout(run,300);
})();
</script>

<script id="v12-index-design-script">
(function(){
  function updateRoadElapsedProgress(){
    var track=document.getElementById('road-track');
    if(!track)return;
    var dots=Array.prototype.slice.call(track.querySelectorAll('.road-dot'));
    if(dots.length<2)return;

    if(window.matchMedia && window.matchMedia('(max-width: 900px)').matches){
      track.style.setProperty('--road-line-left','0px');
      track.style.setProperty('--road-line-width','0px');
      track.style.setProperty('--road-fill-left','0px');
      track.style.setProperty('--road-fill-width','0px');
      return;
    }

    var rect=track.getBoundingClientRect();
    var first=dots[0].getBoundingClientRect();
    var last=dots[dots.length-1].getBoundingClientRect();
    var lineStart=first.right-rect.left;
    var lineEnd=last.left-rect.left;
    var lineWidth=Math.max(0,lineEnd-lineStart);

    var phases=((typeof CONFIG!=='undefined'&&CONFIG&&CONFIG.phases)||[]);
    var activeIndex=0;
    var percent=0;
    if(phases.length && typeof getPhaseProgress==='function'){
      var p=getPhaseProgress(phases);
      activeIndex=Math.max(0,Math.min(dots.length-1,Number(p.activeIndex)||0));
      percent=Math.max(0,Math.min(100,Number(p.percent)||0));
    }

    var active=dots[activeIndex]||dots[0];
    var next=dots[Math.min(activeIndex+1,dots.length-1)]||active;
    var activeRect=active.getBoundingClientRect();
    var nextRect=next.getBoundingClientRect();
    var fillStart=activeRect.right-rect.left;
    var fillEnd=nextRect.left-rect.left;
    var segment=Math.max(0,fillEnd-fillStart);
    var fillWidth=activeIndex>=dots.length-1 ? 0 : segment*(percent/100);

    track.style.setProperty('--road-line-left',lineStart+'px');
    track.style.setProperty('--road-line-width',lineWidth+'px');
    track.style.setProperty('--road-fill-left',fillStart+'px');
    track.style.setProperty('--road-fill-width',fillWidth+'px');
  }

  function run(){requestAnimationFrame(updateRoadElapsedProgress);setTimeout(updateRoadElapsedProgress,140);}

  var previousRender=window.renderHub;

    window.renderHub=function(){previousRender();run();};
  }

    window.updateToday=function(){previousUpdate();run();};
  }

  window.addEventListener('load',run);

})();

      track.style.setProperty('--road-fill-left','0px');
      track.style.setProperty('--road-fill-width','0px');
      return;
    }

    var trackRect=track.getBoundingClientRect();
    var first=dots[0].getBoundingClientRect();
    var last=dots[dots.length-1].getBoundingClientRect();
    var lineStart=first.right-trackRect.left;
    var lineEnd=last.left-trackRect.left;
    var lineWidth=Math.max(0,lineEnd-lineStart);

    var phases=((typeof CONFIG!=='undefined'&&CONFIG&&CONFIG.phases)||[]);

      activeIndex=Math.max(0,Math.min(dots.length-1,Number(progress.activeIndex)||0));
      percent=Math.max(0,Math.min(100,Number(progress.percent)||0));
    }

    var segmentCount=Math.max(1,dots.length-1);
    var overallFraction=(activeIndex+(percent/100))/segmentCount;
    overallFraction=Math.max(0,Math.min(1,overallFraction));
    var fillWidth=lineWidth*overallFraction;

    track.style.setProperty('--road-line-left',lineStart+'px');
    track.style.setProperty('--road-line-width',lineWidth+'px');
    track.style.setProperty('--road-fill-left',lineStart+'px');
    track.style.setProperty('--road-fill-width',fillWidth+'px');

  }
  var oldUpdateToday=window.updateToday;

    window.updateToday=function(){oldUpdateToday();run();};
  }

  function updateVisibleTimelineProgress(){

      return;
    }

    var rect=track.getBoundingClientRect();
    var first=dots[0].getBoundingClientRect();
    var last=dots[dots.length-1].getBoundingClientRect();
    var lineStart=first.right-rect.left;
    var lineEnd=last.left-rect.left;
    var lineWidth=Math.max(0,lineEnd-lineStart);

    var phases=((typeof CONFIG!=='undefined'&&CONFIG&&CONFIG.phases)||[]);

      percent=Math.max(0,Math.min(100,Number(progress.percent)||0));
    }

    var activeDot=dots[activeIndex]||dots[0];
    var nextDot=dots[Math.min(activeIndex+1,dots.length-1)]||activeDot;
    var activeRect=activeDot.getBoundingClientRect();
    var nextRect=nextDot.getBoundingClientRect();
    var activeStart=activeRect.right-rect.left;
    var segmentWidth=Math.max(0,(nextRect.left-rect.left)-activeStart);
    var fillStart=lineStart;
    var fillWidth=(activeIndex>=dots.length-1)?lineWidth:Math.max(0,(activeStart-lineStart)+segmentWidth*(percent/100));

  function run(){

(function(){
  function ensureLayers(track){

    if(!fill){fill=document.createElement('span');fill.className='road-progress-fill';fill.setAttribute('aria-hidden','true');track.insertBefore(fill,base.nextSibling);}
  }
  function updateBar(){
    var track=document.getElementById('road-track');
    if(!track)return;
    ensureLayers(track);
    var dots=Array.prototype.slice.call(track.querySelectorAll('.road-dot'));
    if(dots.length<2)return;

      return;
    }
    var rect=track.getBoundingClientRect();
    var first=dots[0].getBoundingClientRect();
    var last=dots[dots.length-1].getBoundingClientRect();
    var railStart=first.right-rect.left;
    var railEnd=last.left-rect.left;
    var railWidth=Math.max(0,railEnd-railStart);

    var activeStart=a.right-rect.left;

    var fillStart=railStart;
    var fillEnd=(activeIndex>=dots.length-1)?railStart+railWidth:fillStart+Math.max(0,(activeStart-railStart)+segGap*(percent/100));

    track.style.setProperty('--road-line-left',railStart+'px');
    track.style.setProperty('--road-line-width',railWidth+'px');
    track.style.setProperty('--road-fill-left',fillStart+'px');
    track.style.setProperty('--road-fill-width',Math.max(0,fillEnd-fillStart)+'px');
  }
  function run(){requestAnimationFrame(updateBar);setTimeout(updateBar,80);setTimeout(updateBar,260);setTimeout(updateBar,900);}

})();

<script id="v19-locked-countdown-script">
(function(){
  var phaseStarts = {
    'dungeon pride': { phase: 'Phase 2', name: 'Dungeon Pride', startLabel: '15 Jul', start: '2026-07-15T00:00:00+07:00' },
    'grinding pride': { phase: 'Phase 3', name: 'Grinding Pride', startLabel: '25 Jul', start: '2026-07-25T00:00:00+07:00' }
  };
  var countdownTimer = null;
  function esc(v){return String(v == null ? '' : v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function findPhaseFromCard(card){
    var title = (card.querySelector('.phase-title') && card.querySelector('.phase-title').textContent || card.getAttribute('aria-label') || '').trim().toLowerCase();
    if(title.indexOf('dungeon')>-1) return phaseStarts['dungeon pride'];
    if(title.indexOf('grinding')>-1) return phaseStarts['grinding pride'];
    return null;
  }
  function diffParts(startIso){
    var start = new Date(startIso).getTime();
    var now = Date.now();
    var diff = Math.max(0, start - now);
    var totalMinutes = Math.floor(diff / 60000);
    var days = Math.floor(totalMinutes / 1440);
    var hours = Math.floor((totalMinutes % 1440) / 60);
    var minutes = totalMinutes % 60;
    return {days: days, hours: hours, minutes: minutes, started: diff <= 0};
  }
  function renderCountdown(meta){
    var p = diffParts(meta.start);
    var box = document.getElementById('locked-countdown-values');
    var note = document.getElementById('locked-start-note');
    if(!box || !note) return;
    if(p.started){
      box.innerHTML = '<div class="locked-timebox"><strong>LIVE</strong><span>Now</span></div>';
      note.textContent = meta.phase + ' - ' + meta.name + ' has started.';
    }else{
      box.innerHTML = '<div class="locked-timebox"><strong>'+p.days+'</strong><span>Days</span></div><div class="locked-timebox"><strong>'+p.hours+'</strong><span>Hours</span></div><div class="locked-timebox"><strong>'+p.minutes+'</strong><span>Minutes</span></div>';
      note.textContent = meta.phase + ' - ' + meta.name + ' starts at ' + meta.startLabel + '.';
    }
  }
  function showCountdownModal(meta){
    var ov=document.getElementById('locked-modal');
    if(!ov){
      ov=document.createElement('div');
      ov.id='locked-modal';
      ov.className='locked-modal';
      document.body.appendChild(ov);
      ov.addEventListener('click',function(e){if(e.target===ov||e.target.classList.contains('locked-close')){ov.classList.remove('open');if(countdownTimer)clearInterval(countdownTimer);}});
      document.addEventListener('keydown',function(e){if(e.key==='Escape'){ov.classList.remove('open');if(countdownTimer)clearInterval(countdownTimer);}});
    }
    ov.innerHTML='<div class="locked-box" role="dialog" aria-modal="true" aria-labelledby="locked-h"><button class="locked-close" aria-label="Close">&times;</button><p class="locked-kicker">'+esc(meta.phase)+' - '+esc(meta.name)+'</p><p class="locked-h" id="locked-h">The activity has not started yet</p><div class="locked-countdown" id="locked-countdown-values" aria-label="Countdown until activity starts"></div><p class="locked-start-note" id="locked-start-note"></p><p class="locked-p">Details, rewards, and how to participate will be available when the phase begins.</p></div>';
    ov.classList.add('open');
    renderCountdown(meta);
    if(countdownTimer) clearInterval(countdownTimer);
    countdownTimer=setInterval(function(){renderCountdown(meta);}, 30000);
  }
  document.addEventListener('click',function(e){
    var card=e.target.closest && e.target.closest('.phase-card[data-locked], .phase-card.is-locked');
    if(!card) return;
    var meta=findPhaseFromCard(card);
    if(!meta) return;
    e.preventDefault();
    e.stopPropagation();
    if(e.stopImmediatePropagation) e.stopImmediatePropagation();
    showCountdownModal(meta);
  }, true);
})();
</script>
